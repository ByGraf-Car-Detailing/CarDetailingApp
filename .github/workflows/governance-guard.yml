name: governance-guard

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  coworking-proof:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate mandatory coworking trace in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body || "";
            const required = [
              "codex_session_id:",
              "claude_session_id:",
              "timeout_ms:",
              "recommendation:",
              "residual_risk:"
            ];
            const missing = required.filter((k) => !body.includes(k));
            if (missing.length) {
              core.setFailed(`Missing coworking trace fields in PR body: ${missing.join(", ")}`);
              return;
            }
            const banned = /\b(N\/A|TBD|placeholder|timeout)\b/i;
            if (banned.test(body)) {
              core.setFailed("Coworking trace contains forbidden placeholder values (N/A, TBD, placeholder, timeout).");
              return;
            }
            const timeoutMatch = body.match(/timeout_ms:\s*(\d+)/i);
            if (!timeoutMatch || Number(timeoutMatch[1]) < 600000) {
              core.setFailed("timeout_ms is missing or below mandatory minimum (600000).");
              return;
            }
            core.info("Coworking trace validation passed.");

  validate-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run app governance checks
        shell: pwsh
        run: ./scripts/validate-governance.ps1
