name: governance-guard

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run app governance checks
        shell: pwsh
        run: ./scripts/validate-governance.ps1
