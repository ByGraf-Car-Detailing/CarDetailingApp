name: governance-guard

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

jobs:
  coworking-proof:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch live PR body
        uses: actions/github-script@v8
        env:
          PR_BODY_PATH: .tmp-pr-body.md
        with:
          script: |
            const fs = require("fs");
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.setFailed("Missing pull request number in workflow context.");
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            fs.writeFileSync(process.env.PR_BODY_PATH, pr?.body || "", "utf8");
            core.info(`Wrote live PR body to ${process.env.PR_BODY_PATH}`);

      - name: Validate mandatory coworking trace in PR body
        run: node scripts/validate-coworking-trace.mjs --body-file .tmp-pr-body.md

  validate-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run app governance checks
        shell: pwsh
        run: ./scripts/validate-governance.ps1


