name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authenticate Firebase (Service Account)
        shell: bash
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}' > "$RUNNER_TEMP/firebase-sa.json"
          if [ ! -s "$RUNNER_TEMP/firebase-sa.json" ]; then
            echo "Missing or empty secret FIREBASE_SERVICE_ACCOUNT_STAGING"
            exit 1
          fi
          SA_PROJECT_ID=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/firebase-sa.json','utf8'));process.stdout.write(j.project_id||'')")
          if [ "$SA_PROJECT_ID" != "cardetailingapp-e6c95-staging" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_STAGING project_id mismatch: got '$SA_PROJECT_ID', expected 'cardetailingapp-e6c95-staging'"
            exit 1
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase staging
        run: npx firebase deploy --project staging --only hosting,firestore:rules,firestore:indexes
