name: Deploy Production

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Authenticate Firebase (Service Account)
        shell: bash
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROD }}' > "$RUNNER_TEMP/firebase-sa.json"
          if [ ! -s "$RUNNER_TEMP/firebase-sa.json" ]; then
            echo "Missing or empty secret FIREBASE_SERVICE_ACCOUNT_PROD"
            exit 1
          fi
          SA_PROJECT_ID=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/firebase-sa.json','utf8'));process.stdout.write(j.project_id||'')")
          if [ "$SA_PROJECT_ID" != "cardetailingapp-e6c95" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_PROD project_id mismatch: got '$SA_PROJECT_ID', expected 'cardetailingapp-e6c95'"
            exit 1
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase production
        run: npx firebase deploy --project prod --only hosting,firestore:rules,firestore:indexes
