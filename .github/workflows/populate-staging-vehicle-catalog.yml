name: Populate Staging Vehicle Catalog

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type exactly: populate-catalog=staging-nhtsa"
        required: true
        type: string
      mode:
        description: "Select mode"
        required: true
        default: makes
        type: choice
        options:
          - makes
          - models_active
      max_writes:
        description: "Max Firestore writes allowed for this run"
        required: true
        default: "500"
        type: string

permissions:
  contents: read

jobs:
  populate-staging-vehicle-catalog:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate confirmation
        shell: bash
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "populate-catalog=staging-nhtsa" ]; then
            echo "Invalid confirmation value. Expected exactly: populate-catalog=staging-nhtsa"
            exit 1
          fi

      - name: Materialize staging service account
        shell: bash
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}' > "$RUNNER_TEMP/firebase-sa-staging.json"
          if [ ! -s "$RUNNER_TEMP/firebase-sa-staging.json" ]; then
            echo "Missing or empty secret FIREBASE_SERVICE_ACCOUNT_STAGING"
            exit 1
          fi
          STAGING_PROJECT_ID=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/firebase-sa-staging.json','utf8'));process.stdout.write(j.project_id||'')")
          if [ "$STAGING_PROJECT_ID" != "cardetailingapp-e6c95-staging" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_STAGING project_id mismatch: got '$STAGING_PROJECT_ID', expected 'cardetailingapp-e6c95-staging'"
            exit 1
          fi
          echo "STAGING_SA_PATH=$RUNNER_TEMP/firebase-sa-staging.json" >> "$GITHUB_ENV"

      - name: Populate staging catalog from NHTSA
        env:
          CATALOG_CONFIRMATION: ${{ github.event.inputs.confirmation }}
          CATALOG_MODE: ${{ github.event.inputs.mode }}
          CATALOG_MAX_WRITES: ${{ github.event.inputs.max_writes }}
          STAGING_SA_PATH: ${{ env.STAGING_SA_PATH }}
        run: node scripts/populate-staging-vehicle-catalog.mjs

