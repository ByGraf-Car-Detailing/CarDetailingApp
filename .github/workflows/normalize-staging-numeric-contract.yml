name: Normalize Staging Numeric Contract

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type exactly: normalize-numeric-contract=staging"
        required: true
        type: string
      dry_run:
        description: "Run in dry-run mode"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  normalize-staging-numeric-contract:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate confirmation
        shell: bash
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "normalize-numeric-contract=staging" ]; then
            echo "Invalid confirmation value. Expected exactly: normalize-numeric-contract=staging"
            exit 1
          fi

      - name: Materialize staging service account
        shell: bash
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}' > "$RUNNER_TEMP/firebase-sa-staging.json"
          if [ ! -s "$RUNNER_TEMP/firebase-sa-staging.json" ]; then
            echo "Missing or empty secret FIREBASE_SERVICE_ACCOUNT_STAGING"
            exit 1
          fi
          STAGING_PROJECT_ID=$(node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync(process.env.RUNNER_TEMP + '/firebase-sa-staging.json','utf8'));process.stdout.write(j.project_id||'')")
          if [ "$STAGING_PROJECT_ID" != "cardetailingapp-e6c95-staging" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT_STAGING project_id mismatch: got '$STAGING_PROJECT_ID', expected 'cardetailingapp-e6c95-staging'"
            exit 1
          fi
          echo "NUMERIC_CONTRACT_SA_PATH=$RUNNER_TEMP/firebase-sa-staging.json" >> "$GITHUB_ENV"

      - name: Normalize numeric contract
        env:
          NUMERIC_CONTRACT_TARGET: staging
          NUMERIC_CONTRACT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          NUMERIC_CONTRACT_SA_PATH: ${{ env.NUMERIC_CONTRACT_SA_PATH }}
        run: node scripts/normalize-numeric-contract.mjs
