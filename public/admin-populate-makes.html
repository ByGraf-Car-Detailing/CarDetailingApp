<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Popola vehicleMakes</title>
</head>
<body>
  <h2>Popola collezione vehicleMakes</h2>
  <button id="startBtn"> Avvia popolamento</button>
  <pre id="log" style="background:#222;color:#0f0;padding:15px;height:400px;overflow:auto;"></pre>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

    const firebaseConfig = await fetch("/__/firebase/init.json", { cache: "no-store" }).then(r => r.json());
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const log = document.getElementById("log");

    function print(msg) {
      log.textContent += msg + "\n";
      log.scrollTop = log.scrollHeight;
    }

    document.getElementById("startBtn").addEventListener("click", async () => {
      document.getElementById("startBtn").disabled = true;
      log.textContent = "";

      try {
        print(" Fetching marche da API NHTSA...");
        const resp = await fetch("https://vpic.nhtsa.dot.gov/api/vehicles/getallmakes?format=json");
        const data = await resp.json();

        if (!data.Results || !Array.isArray(data.Results)) {
          print(" Errore: risposta API non valida");
          return;
        }

        const makes = data.Results.map(m => m.Make_Name).filter(Boolean);
        print(` Trovate ${makes.length} marche`);

        print(" Controllo marche esistenti...");
        const existingSnap = await getDocs(collection(db, "vehicleMakes"));
        const existingNames = new Set();
        existingSnap.forEach(d => existingNames.add(d.data().name?.toUpperCase()));
        print(` Marche gi presenti: ${existingNames.size}`);

        let added = 0;
        let skipped = 0;

        for (const name of makes) {
          const nameUpper = name.toUpperCase();
          if (existingNames.has(nameUpper)) {
            skipped++;
            continue;
          }

          const docId = nameUpper.replace(/[^A-Z0-9]/g, "_");
          await setDoc(doc(db, "vehicleMakes", docId), {
            name: name,
            active: false,
            addedAt: new Date().toISOString()
          });
          added++;

          if (added % 500 === 0) {
            print(` Inserite ${added} marche...`);
          }
        }

        print(`\n Completato!`);
        print(`   Aggiunte: ${added}`);
        print(`   Saltate (gi esistenti): ${skipped}`);
        print(`\n Ora attiva le marche in Firebase Console`);

      } catch (err) {
        print(" Errore: " + err.message);
      }

      document.getElementById("startBtn").disabled = false;
    });
  </script>
</body>
</html>
